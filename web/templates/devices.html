{% extends "base.html" %}
{% block title %}Vincular aparelho — Telefone Fixo{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-4">Vincular aparelho</h2>
    <p>Digite o codigo de registro que esta colado no aparelho da crianca.</p>
    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label for="code" class="form-label">Codigo de registro</label>
        <input type="text" class="form-control text-uppercase" id="code" name="code"
               maxlength="8" pattern="[A-Za-z0-9]{8}" required
               placeholder="Ex: AB12CD34">
      </div>
      <button type="submit" class="btn btn-primary">Vincular</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-link">Voltar</a>
    </form>
  </div>
</div>
{% endblock %}
