{% extends "base.html" %}
{% block title %}Redefinir senha — Telefone Fixo{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-4">Redefinir senha</h2>
    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label for="password" class="form-label">Nova senha</label>
        <input type="password" class="form-control" id="password" name="password" required minlength="6">
      </div>
      <div class="mb-3">
        <label for="password2" class="form-label">Confirmar nova senha</label>
        <input type="password" class="form-control" id="password2" name="password2" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-100">Redefinir senha</button>
    </form>
  </div>
</div>
{% endblock %}
