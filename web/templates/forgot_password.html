{% extends "base.html" %}
{% block title %}Esqueci minha senha — Telefone Fixo{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-4">Esqueci minha senha</h2>
    <p>Digite seu email e enviaremos um link para redefinir a senha.</p>
    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Enviar link</button>
    </form>
    <p class="mt-3 text-center">
      <a href="{{ url_for('login') }}">Voltar ao login</a>
    </p>
  </div>
</div>
{% endblock %}
