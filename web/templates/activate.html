{% extends "base.html" %}
{% block title %}Ativar aparelho — Telefone Fixo{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="text-center mb-4">
    <i class="bi bi-telephone-fill fs-1 text-primary"></i>
    <h4 class="mt-2">Ativar aparelho</h4>
    <p class="text-muted">Digite o codigo que esta colado no aparelho e crie sua conta.</p>
  </div>
  <div class="card">
    <div class="card-body p-4">
      <form method="post">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label for="code" class="form-label">Codigo do aparelho</label>
          <input type="text" class="form-control form-control-lg text-uppercase font-monospace text-center"
                 id="code" name="code" maxlength="8" required placeholder="ABC12345">
        </div>
        <div class="mb-3">
          <label for="child_name" class="form-label">Nome da crianca</label>
          <input type="text" class="form-control form-control-lg" id="child_name" name="child_name" required
                 placeholder="Ex: Joao">
        </div>
        <hr>
        <div class="mb-3">
          <label for="email" class="form-label">Seu email</label>
          <input type="email" class="form-control form-control-lg" id="email" name="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Crie uma senha</label>
          <input type="password" class="form-control form-control-lg" id="password" name="password" required minlength="6">
        </div>
        <div class="mb-3">
          <label for="password2" class="form-label">Confirme a senha</label>
          <input type="password" class="form-control form-control-lg" id="password2" name="password2" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">Ativar</button>
      </form>
    </div>
  </div>
  <p class="text-center mt-3">
    Ja tem conta? <a href="{{ url_for('login') }}">Faca login</a>
  </p>
</div>
{% endblock %}
