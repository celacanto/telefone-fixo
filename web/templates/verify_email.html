{% extends "base.html" %}
{% block title %}Verificar email — Telefone Fixo{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="text-center mb-4">
    <i class="bi bi-envelope-check fs-1 text-primary"></i>
    <h4 class="mt-2">Verificar email</h4>
    <p class="text-muted">Enviamos um codigo de 6 digitos para <strong>{{ email }}</strong></p>
  </div>
  <div class="card">
    <div class="card-body p-4">
      <form method="post">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label for="code" class="form-label">Codigo de verificacao</label>
          <input type="text" class="form-control form-control-lg text-center font-monospace fs-3"
                 id="code" name="code" maxlength="6" pattern="[0-9]{6}" required
                 placeholder="000000" inputmode="numeric" autocomplete="one-time-code" autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">Confirmar</button>
      </form>
      <p class="text-center text-muted small mt-3 mb-0">O codigo expira em 10 minutos.</p>
    </div>
  </div>
  <p class="text-center mt-3">
    <a href="{{ url_for('activate') }}">Voltar e corrigir email</a>
  </p>
</div>
{% endblock %}
