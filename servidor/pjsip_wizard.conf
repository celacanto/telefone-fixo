; =============================================================================
; pjsip_wizard.conf — Ramais SIP (formato wizard)
; O wizard cria endpoint, auth e AOR automaticamente com nomes corretos
; Projeto: Telefone para crianças via internet
; =============================================================================

; RAMAL 067 — Inácio (HT802 #1, porta 1)
[067]
type = wizard
accepts_registrations = yes
sends_registrations = no
accepts_auth = yes
remote_hosts = dynamic
inbound_auth/auth_type = userpass
inbound_auth/username = 067
inbound_auth/password = mQ2rinixVJe2nxAiof9P6A
endpoint/context = telefones-criancas
endpoint/allow = !all,ulaw,alaw
endpoint/direct_media = no
endpoint/rtp_symmetric = yes
endpoint/force_rport = yes
endpoint/rewrite_contact = yes
endpoint/callerid = Inacio <067>
aor/max_contacts = 1
aor/remove_existing = yes
aor/default_expiration = 120

