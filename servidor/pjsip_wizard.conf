; =============================================================================
; pjsip_wizard.conf — Exemplo de configuracao de ramais SIP (formato wizard)
; O wizard cria endpoint, auth e AOR automaticamente
;
; NAO edite este arquivo manualmente em producao.
; Use o script configurar-telefone.sh para adicionar ramais.
; =============================================================================

; Exemplo de ramal — substitua os valores
;[001]
;type = wizard
;accepts_registrations = yes
;sends_registrations = no
;accepts_auth = yes
;remote_hosts = dynamic
;inbound_auth/auth_type = userpass
;inbound_auth/username = 001
;inbound_auth/password = SENHA_GERADA_PELO_SCRIPT
;endpoint/context = telefones-criancas
;endpoint/allow = !all,ulaw,alaw
;endpoint/direct_media = no
;endpoint/rtp_symmetric = yes
;endpoint/force_rport = yes
;endpoint/rewrite_contact = yes
;aor/max_contacts = 1
;aor/remove_existing = yes
;aor/default_expiration = 120
