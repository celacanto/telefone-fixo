; =============================================================================
; extensions.conf — Plano de discagem
; Projeto: Telefone para crianças via internet
; =============================================================================

[general]
static = yes
writeprotect = no

; -----------------------------------------------------------------------------
; CONTEXTO PRINCIPAL: telefones-criancas
; Todos os ramais das crianças entram aqui
; -----------------------------------------------------------------------------
[telefones-criancas]

; --- Controle de horário ---
; Horário permitido: 10h às 22h, horário de Brasília (UTC-3)
; GotoIfTime(horário_inicio-horário_fim,dias_semana,dias_mes,meses?destino)
; *,*,* = qualquer dia da semana, dia do mês e mês

; Ramal 067 — Liga pro Inácio
exten => 067,1,NoOp(Chamada para ramal 067 - Inacio)
 same => n,GotoIfTime(10:00-21:59,*,*,*,America/Sao_Paulo?permitido-067,067,1)
 same => n,Playback(silence/1)
 same => n,Playback(ss-noservice)
 same => n,Hangup()

; Ramal 001 — Liga pro Amigo
exten => 001,1,NoOp(Chamada para ramal 001 - Amigo)
 same => n,GotoIfTime(10:00-21:59,*,*,*,America/Sao_Paulo?permitido-001,001,1)
 same => n,Playback(silence/1)
 same => n,Playback(ss-noservice)
 same => n,Hangup()

; Ramal 002 — Liga pra Madalena
exten => 002,1,NoOp(Chamada para ramal 002 - Madalena)
 same => n,GotoIfTime(10:00-21:59,*,*,*,America/Sao_Paulo?permitido-002,002,1)
 same => n,Playback(silence/1)
 same => n,Playback(ss-noservice)
 same => n,Hangup()

; Ramal 100 — Hora certa (útil para testar)
exten => 100,1,NoOp(Hora certa)
 same => n,Answer()
 same => n,Wait(1)
 same => n,SayUnixTime(,,ABdY 'digits/at' IMp)
 same => n,Hangup()

; Bloqueio: qualquer outro número é recusado
exten => _X.,1,NoOp(Numero bloqueado: ${EXTEN})
 same => n,Playback(silence/1)
 same => n,Playback(ss-noservice)
 same => n,Hangup()

; Bloqueio de chamada inválida
exten => i,1,NoOp(Extensao invalida)
 same => n,Playback(ss-noservice)
 same => n,Hangup()

; -----------------------------------------------------------------------------
; CONTEXTO: chamadas permitidas (passou no controle de horário)
; -----------------------------------------------------------------------------

[permitido-067]
exten => 067,1,NoOp(Chamada permitida para 067)
 same => n,Set(CDR(userfield)=chamada-crianca)
 same => n,Dial(PJSIP/067,60,rtT)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?ocupado)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?semresposta)
 same => n,Hangup()
 same => n(ocupado),Playback(tt-allbusy)
 same => n,Hangup()
 same => n(semresposta),Playback(vm-nobodyavail)
 same => n,Hangup()

[permitido-001]
exten => 001,1,NoOp(Chamada permitida para 001)
 same => n,Set(CDR(userfield)=chamada-crianca)
 same => n,Dial(PJSIP/001,60,rtT)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?ocupado)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?semresposta)
 same => n,Hangup()
 same => n(ocupado),Playback(tt-allbusy)
 same => n,Hangup()
 same => n(semresposta),Playback(vm-nobodyavail)
 same => n,Hangup()

[permitido-002]
exten => 002,1,NoOp(Chamada permitida para 002)
 same => n,Set(CDR(userfield)=chamada-crianca)
 same => n,Dial(PJSIP/002,60,rtT)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?ocupado)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?semresposta)
 same => n,Hangup()
 same => n(ocupado),Playback(tt-allbusy)
 same => n,Hangup()
 same => n(semresposta),Playback(vm-nobodyavail)
 same => n,Hangup()
